<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <title>Στάσιμο κύμα σε χορδή κιθάρας</title>

  <!-- p5 core -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- p5 sound -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <style>
    /* RESET */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      touch-action: manipulation; /* καλύτερο για touch */
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Κέντρο για το stasima2 */
    #stasima2-holder {
      max-width: 100%;
      max-height: 100%;
    }

    /* Ρύθμιση canvas ώστε να κλιμακώνεται */
    canvas {
      max-width: 100vw !important;
      max-height: 100vh !important;
      height: auto !important;
      display: block;
    }

    /* p5 DOM στοιχεία */
    input, label, div {
      color: white;
    }

    /* Checkbox πιο ευδιάκριτο σε touch */
    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 6px;
    }
  </style>
</head>

<body>
  <!-- Εκεί θα τοποθετηθεί το canvas -->
  <div id="stasima2-holder"></div>

  <!-- Το stasima2 σου -->
  <script src="stasima2.js"></script>
</body>
</html>
